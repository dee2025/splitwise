<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">MoneySplit logo</title>
  <desc id="desc">A teal and blue MoneySplit mark with an M shape, two people, and a rupee coin.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#21d19f"/>
      <stop offset="0.48" stop-color="#0797a7"/>
      <stop offset="1" stop-color="#0b63c7"/>
    </linearGradient>
    <linearGradient id="personLeft" x1="0.1" y1="0" x2="0.95" y2="1">
      <stop offset="0" stop-color="#70f47b"/>
      <stop offset="1" stop-color="#20d879"/>
    </linearGradient>
    <linearGradient id="personRight" x1="0.1" y1="0" x2="0.95" y2="1">
      <stop offset="0" stop-color="#24e3db"/>
      <stop offset="1" stop-color="#10bad0"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#48f1a3"/>
      <stop offset="1" stop-color="#12b99a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#043356" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g filter="url(#softShadow)">
    <path fill="#ffffff" d="M229 682V322c0-34 40-51 64-28l218 210 219-210c24-23 64-6 64 28v360c0 68-55 124-124 124V480L535 610v230h-48V610L353 480v326c-69 0-124-56-124-124Z"/>

    <circle cx="376" cy="622" r="38" fill="url(#personLeft)"/>
    <path fill="url(#personLeft)" d="M306 806c14-82 89-139 181-138v154c-68-4-130-10-181-16Z"/>

    <circle cx="648" cy="622" r="38" fill="url(#personRight)"/>
    <path fill="url(#personRight)" d="M536 822V668c92-1 167 56 181 138-51 6-113 12-181 16Z"/>

    <circle cx="512" cy="360" r="96" fill="none" stroke="#77f2c5" stroke-width="18" opacity="0.85"/>
    <circle cx="512" cy="360" r="76" fill="url(#coin)" stroke="#0c9f86" stroke-width="8"/>
    <text x="512" y="416" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="132" font-weight="800" fill="#ffffff">₹</text>

    <path d="M488 489v-24M512 480v-30M536 489v-24" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
